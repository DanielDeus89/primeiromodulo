<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Menu de Aulas</title>
  <link rel="stylesheet" href="./css/menu.css" />
</head>
<body>
  <!-- Botão para abrir menu -->
  <div class="menu-toggle" onclick="toggleSidebar()">☰ Menu</div>

  <!-- Menu lateral oculto -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="close-btn" onclick="toggleSidebar()">✖</span>
    </div>
    <ul>
      <li><a href="#" onclick="carregarAula(this, 'aula01')">📘 Aula 01</a></li>
      <li><a href="#" onclick="carregarAula(this, 'aula02')">📘 Aula 02</a></li>
      <li><a href="#" onclick="carregarAula(this, 'aula03')">📘 Aula 03</a></li>
      <li><a href="#" onclick="carregarAula(this, 'aula04')">📘 Aula 04</a></li>
      <li><a href="#" onclick="carregarAula(this, 'aula05')">📘 Aula 05</a></li>
      <li><a href="#" onclick="carregarAula(this, 'aula06')">📘 Aula 06</a></li>
      <li><a href="#" onclick="carregarAula(this, 'review1')">📘 Review 01</a></li>
      <li><a href="#" onclick="carregarAula(this, 'aula07')">📘 Aula 07</a></li>

      <li><a href="#" onclick="carregarAula(this, 'aula23')">📘 Aula 23</a></li>
      <li><a href="#" onclick="carregarAula(this, 'aula36')">📘 Aula 36</a></li>
      <li><a href="#" onclick="carregarAula(this, 'aula37')">📘 Aula 37</a></li>
      <li><a href="#" onclick="carregarAula(this, 'aula38')">📘 Aula 38</a></li>
      <li><a href="#" onclick="carregarAula(this, 'aula39')">📘 Aula 39</a></li>
      <li><a href="#" onclick="carregarAula(this, 'suh')">📘 suh</a></li>
    </ul>
  </div>

  <!-- Conteúdo principal //./conteudo/aula64.html -->
  <div class="main-content">
    <iframe id="iframeAula" src=""></iframe>
  </div>

  <script>
    function toggleSidebar() {
      const sidebar = document.getElementById("sidebar");
      sidebar.classList.toggle("active");
    }

    function carregarAula(elemento, aula) {
      const url = `./conteudo/${aula}.html`;
      document.getElementById("iframeAula").src = url;

      const links = document.querySelectorAll(".sidebar a");
      links.forEach(link => link.classList.remove("active"));
      elemento.classList.add("active");

      // Fecha menu no mobile
      document.getElementById("sidebar").classList.remove("active");
    }
  </script>
</body>
</html>
